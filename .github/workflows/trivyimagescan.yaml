# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: trivy_image_scan

on: 
  workflow_dispatch:
  pull_request: 
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
    trivy_image_scan_platform:
      permissions:
        contents: read # for actions/checkout to fetch code
        security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
        actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
      name: trivy_image_scan
      runs-on: "ubuntu-latest"
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Build an image from Dockerfile
          run: |
            echo "running make build platform benchmark"
            cd docker && make build-benchmark
        - name: Run Trivy vulnerability scanner
          uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
          with:
            image-ref: 'benchmark:latest'
            format: 'table'
            severity: 'CRITICAL,HIGH'
            output: 'trivy-performance-tools-results.txt'

        - name: Upload Trivy scan results
          uses: actions/upload-artifact@v4
          with:
            name: trivy-performance-tools-report
            path: trivy-performance-tools-results.txt
